# GHI-TIME — one service. App binds localhost only; TLS is terminated by
# `tailscale serve` on the MagicDNS hostname (see README). No public exposure.
services:
  ghitime:
    build: .
    restart: always          # unattended-for-a-month: always come back up
    ports:
      - "127.0.0.1:8080:8000"
    volumes:
      - ./data:/data         # SQLite file on a bind-mounted volume
    environment:
      TZ: America/Chicago
      GHITIME_COOKIE_SECURE: "1"
    logging:                 # log rotation, no shorter than needed
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
