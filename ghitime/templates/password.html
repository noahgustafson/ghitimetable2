{% extends "base.html" %}
{% block title %}Change password{% endblock %}
{% block content %}
<h1>Change password</h1>
{% if forced %}<p class="warn">You must set your own password before continuing.</p>{% endif %}
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" class="card narrow">
  <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
  <label>Current password <input name="current" type="password" required></label>
  <label>New password (8+ characters) <input name="new" type="password" minlength="8" required></label>
  <button class="primary">Change password</button>
</form>
{% endblock %}
